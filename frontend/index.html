<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF→IFC 簡易3D立ち上げ PoC</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>自然言語・UI操作 → IFC 3D壁モデル生成</h1>
    <nav class="tab-bar">
      <button class="tab active" data-tab="canvas">Canvas UI</button>
      <button class="tab" data-tab="chat">AI チャット</button>
    </nav>
  </header>

  <main>
    <!-- ===== Tab 1: Canvas UI ===== -->
    <section class="canvas-area tab-content active" id="tab-canvas">
      <div class="canvas-toolbar">
        <label class="file-label">
          図面画像を読み込む
          <input type="file" id="imageInput" accept="image/*" />
        </label>
        <button id="undoBtn" title="直前の壁を取消">↩ 元に戻す</button>
        <button id="clearBtn" title="全壁を削除">🗑 すべてクリア</button>
        <button id="autoDetectBtn" title="アップロード画像から壁を自動検出">画像から自動認識</button>
        <span id="wallCount">壁: 0</span>
      </div>
      <div class="canvas-wrapper">
        <canvas id="drawCanvas" width="900" height="600"></canvas>
        <p class="hint">クリックで始点→終点を指定して壁を描画します（複数壁を連続追加可能）</p>
      </div>
    </section>

    <aside class="params-panel">
      <h2>パラメータ</h2>

      <div class="field">
        <label for="wallHeight">壁の高さ (mm)</label>
        <input type="number" id="wallHeight" value="3000" min="1" step="100" />
      </div>

      <div class="field">
        <label for="wallThickness">壁の厚み (mm)</label>
        <input type="number" id="wallThickness" value="200" min="1" step="10" />
      </div>

      <div class="field">
        <label for="scaleFactor">スケール係数</label>
        <input type="number" id="scaleFactor" value="1.0" min="0.001" step="0.1" />
      </div>

      <p id="globalWallCount" class="wall-count-global">合計壁数: 0</p>
      <button id="generateBtn" class="primary-btn">すべての壁からIFC生成 &amp; ダウンロード</button>
      <p id="statusMsg" class="status"></p>
    </aside>

    <!-- ===== Tab 2: AI Chat ===== -->
    <section class="chat-area tab-content" id="tab-chat">
      <div class="chat-container">
        <div class="chat-messages" id="chatMessages">
          <div class="chat-msg system">
            自然言語で壁を記述してください。<br />
            例: 「高さ3m、幅5mの壁を作って」「L字型の壁を2枚、高さ2.7m、厚さ150mm」
          </div>
        </div>
        <form class="chat-input-area" id="chatForm">
          <input
            type="text"
            id="chatInput"
            placeholder="壁の説明を入力… 例: 高さ3m、幅5mの壁を作って"
            autocomplete="off"
          />
          <button type="submit" id="chatSendBtn" class="primary-btn">送信</button>
        </form>
      </div>
      <aside class="chat-result-panel" id="chatResultPanel">
        <h2>解析結果</h2>
        <pre id="parsedJson" class="parsed-json">AIの解析結果がここに表示されます</pre>
        <p id="chatStatusMsg" class="status"></p>
      </aside>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
